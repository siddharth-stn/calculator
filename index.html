<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="frame">
        <div class="display"></div>
        <div class="keypad">
            <div class="numKeys">
                <div id="7">7</div>
                <div id="8">8</div>
                <div id="9">9</div>
                <div id="4">4</div>
                <div id="5">5</div>
                <div id="6">6</div>
                <div id="1">1</div>
                <div id="2">2</div>
                <div id="3">3</div>
                <div id="clear">c</div>
                <div id="0">0</div>
                <div id="equals">=</div>
            </div>
            <div class="operators">
                <div id="plus">+</div>
                <div id="minus">-</div>
                <div id="multiply">*</div>
                <div id="divide">/</div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
